<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="50" y="70" font-family="Arial" font-size="34" font-weight="800" fill="#111827">Objection guidance and manager coaching</text><text x="50" y="105" font-family="Arial" font-size="18" fill="#4b5563">Guidance for reps and coaching direction for sales managers.</text><rect x="50" y="165" width="525" height="330" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="165" width="7" height="330" fill="#1d4ed8"/><text x="82" y="215" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Objection Guidance</text><text x="82" y="270" font-family="Arial" font-size="19" fill="#4b5563">Rebuild value before discounting.</text><text x="82" y="320" font-family="Arial" font-size="19" fill="#4b5563">Clarify scope, warranty, risk, financing, install quality, and cost of waiting.</text><text x="82" y="390" font-family="Arial" font-size="19" fill="#4b5563">Focus on the customer’s real concern instead of reacting to price alone.</text><rect x="625" y="165" width="525" height="330" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="625" y="165" width="7" height="330" fill="#111827"/><text x="657" y="215" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Manager Coaching Note</text><text x="657" y="270" font-family="Arial" font-size="19" fill="#4b5563">Treat this as active pipeline and follow up today.</text><text x="657" y="330" font-family="Arial" font-size="19" fill="#4b5563">Coach the rep to rebuild value and clarify scope before discounting.</text><text x="657" y="410" font-family="Arial" font-size="19" fill="#4b5563">Review the next three opportunities for follow-up discipline.</text></svg>