<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="50" y="70" font-family="Arial" font-size="34" font-weight="800" fill="#111827">Customer communication</text><text x="50" y="105" font-family="Arial" font-size="18" fill="#4b5563">Copy-ready text message, email, and voicemail script generated from the sales context.</text><rect x="50" y="145" width="525" height="425" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="145" width="7" height="425" fill="#111827"/><text x="82" y="195" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Text Message</text><text x="82" y="240" font-family="Arial" font-size="18" fill="#4b5563">Hi Avery, this is a quick follow-up from Summit Home Services. I wanted to see if you had any questions about the estimate, scope, or options we reviewed.</text><text x="82" y="315" font-family="Arial" font-size="18" fill="#4b5563">The goal is really about protecting the home from leaks, storm damage, and long-term issues.</text><text x="82" y="390" font-family="Arial" font-size="18" fill="#4b5563">Would you like me to help you review the next step?</text><rect x="625" y="145" width="525" height="425" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="625" y="145" width="7" height="425" fill="#1d4ed8"/><text x="657" y="195" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Email + Voicemail</text><text x="657" y="240" font-family="Arial" font-size="18" fill="#111827" font-weight="800">Subject:</text><text x="740" y="240" font-family="Arial" font-size="18" fill="#4b5563">Following Up on Your Roof Replacement Estimate</text><text x="657" y="300" font-family="Arial" font-size="18" fill="#4b5563">I wanted to help you think through the best next step and make the decision clearer.</text><text x="657" y="370" font-family="Arial" font-size="18" fill="#111827" font-weight="800">Voicemail:</text><text x="657" y="410" font-family="Arial" font-size="18" fill="#4b5563">I was calling to follow up on your project. I’ll send a quick text as well.</text></svg>