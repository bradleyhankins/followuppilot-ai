<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1440" height="900" fill="#f8fafc"/><rect x="40" y="36" width="1360" height="210" rx="28" fill="#111827"/><text x="80" y="86" fill="#93c5fd" font-family="Arial" font-size="20" font-weight="700" letter-spacing="4">SALES FOLLOW-UP WORKFLOW TOOL</text><text x="80" y="150" fill="#fff" font-family="Arial" font-size="56" font-weight="800">FollowUpPilot AI</text><text x="80" y="200" fill="#e5e7eb" font-family="Arial" font-size="24">Turn customer context into next-best actions, copy-ready communication, CRM notes, and follow-up sequences.</text><text x="40" y="310" fill="#111827" font-family="Arial" font-size="34" font-weight="800">Follow-up recommendation</text><rect x="40" y="340" width="315" height="125" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="70" y="385" fill="#6b7280" font-family="Arial" font-size="17" font-weight="700">PRIORITY</text><text x="70" y="438" fill="#111827" font-family="Arial" font-size="38" font-weight="800">High Priority</text><rect x="390" y="340" width="315" height="125" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="420" y="385" fill="#6b7280" font-family="Arial" font-size="17" font-weight="700">LEAD TEMPERATURE</text><text x="420" y="438" fill="#111827" font-family="Arial" font-size="38" font-weight="800">Hot</text><rect x="740" y="340" width="315" height="125" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="770" y="385" fill="#6b7280" font-family="Arial" font-size="17" font-weight="700">DEAL RISK</text><text x="770" y="438" fill="#111827" font-family="Arial" font-size="38" font-weight="800">Medium</text><rect x="1090" y="340" width="310" height="125" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="1120" y="385" fill="#6b7280" font-family="Arial" font-size="17" font-weight="700">TIMING</text><text x="1120" y="438" fill="#111827" font-family="Arial" font-size="34" font-weight="800">Today</text><rect x="40" y="500" width="1360" height="105" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="70" y="542" fill="#111827" font-family="Arial" font-size="24" font-weight="800">Next Best Action</text><text x="70" y="580" fill="#4b5563" font-family="Arial" font-size="20">Call first, then send a short value-based recap text. Rebuild value before discussing any pricing change.</text><text x="40" y="660" fill="#111827" font-family="Arial" font-size="34" font-weight="800">Copy center</text><rect x="40" y="690" width="430" height="140" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="70" y="735" fill="#111827" font-family="Arial" font-size="22" font-weight="800">Send this text</text><text x="70" y="770" fill="#4b5563" font-family="Arial" font-size="18">Quick check-in with value reminder and clear next step.</text><rect x="505" y="690" width="430" height="140" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="535" y="735" fill="#111827" font-family="Arial" font-size="22" font-weight="800">Add this CRM note</text><text x="535" y="770" fill="#4b5563" font-family="Arial" font-size="18">Priority, main risk, next action, and follow-up timing.</text><rect x="970" y="690" width="430" height="140" rx="20" fill="#fff" stroke="#e5e7eb"/><text x="1000" y="735" fill="#111827" font-family="Arial" font-size="22" font-weight="800">Follow-up timeline</text><text x="1000" y="770" fill="#4b5563" font-family="Arial" font-size="18">Today: text + call • Tomorrow: email • Day 3: value reminder.</text></svg>