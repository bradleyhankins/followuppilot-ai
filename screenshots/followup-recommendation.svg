<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="50" y="70" font-family="Arial" font-size="34" font-weight="800" fill="#111827">Follow-up recommendation</text><text x="50" y="105" font-family="Arial" font-size="18" fill="#4b5563">Priority, lead temperature, deal risk, timing, and next best action.</text><g font-family="Arial"><rect x="50" y="145" width="250" height="120" rx="18" fill="#fff" stroke="#e5e7eb"/><text x="75" y="183" fill="#6b7280" font-size="15" font-weight="700">PRIORITY</text><text x="75" y="228" fill="#111827" font-size="28" font-weight="800">High Priority</text><text x="75" y="252" fill="#64748b" font-size="15">Score: 9</text><rect x="325" y="145" width="250" height="120" rx="18" fill="#fff" stroke="#e5e7eb"/><text x="350" y="183" fill="#6b7280" font-size="15" font-weight="700">LEAD TEMPERATURE</text><text x="350" y="228" fill="#111827" font-size="30" font-weight="800">Hot</text><rect x="600" y="145" width="250" height="120" rx="18" fill="#fff" stroke="#e5e7eb"/><text x="625" y="183" fill="#6b7280" font-size="15" font-weight="700">DEAL RISK</text><text x="625" y="228" fill="#111827" font-size="30" font-weight="800">Medium</text><text x="625" y="252" fill="#64748b" font-size="15">Price resistance</text><rect x="875" y="145" width="250" height="120" rx="18" fill="#fff" stroke="#e5e7eb"/><text x="900" y="183" fill="#6b7280" font-size="15" font-weight="700">TIMING</text><text x="900" y="228" fill="#111827" font-size="27" font-weight="800">Today</text></g><rect x="50" y="315" width="1100" height="145" rx="18" fill="#f8fafc" stroke="#e5e7eb"/><rect x="50" y="315" width="7" height="145" fill="#111827"/><text x="82" y="360" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Next Best Action</text><text x="82" y="400" font-family="Arial" font-size="19" fill="#4b5563">Call first, then send a short recap text. Rebuild value before discussing any pricing change.</text><rect x="50" y="500" width="1100" height="115" rx="18" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="500" width="7" height="115" fill="#1d4ed8"/><text x="82" y="545" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Why this recommendation</text><text x="82" y="585" font-family="Arial" font-size="18" fill="#4b5563">Estimate presented + high urgency + price concern + recent contact = active opportunity requiring same-day follow-up.</text></svg>