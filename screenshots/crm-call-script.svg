<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="50" y="70" font-family="Arial" font-size="34" font-weight="800" fill="#111827">CRM and call workflow</text><text x="50" y="105" font-family="Arial" font-size="18" fill="#4b5563">Clean CRM documentation and a rep-ready call script from the same customer context.</text><rect x="50" y="145" width="525" height="455" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="145" width="7" height="455" fill="#111827"/><text x="82" y="195" font-family="Arial" font-size="25" font-weight="800" fill="#111827">CRM Note</text><g font-family="Arial" font-size="17" fill="#4b5563"><text x="82" y="240">Customer: Avery Johnson</text><text x="82" y="278">Project Type: Roof Replacement</text><text x="82" y="316">Lead Temperature: Hot</text><text x="82" y="354">Deal Risk: Medium</text><text x="82" y="392">Priority: High Priority</text><text x="82" y="430">Main Risk: Price resistance</text><text x="82" y="468">Next Best Action: Call first, then send recap text.</text></g><rect x="625" y="145" width="525" height="455" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="625" y="145" width="7" height="455" fill="#1d4ed8"/><text x="657" y="195" font-family="Arial" font-size="25" font-weight="800" fill="#111827">Call Script</text><g font-family="Arial" font-size="17" fill="#4b5563"><text x="657" y="240">Opening: Hi, is this Avery?</text><text x="657" y="290">Reason: I wanted to reconnect and help with the next step.</text><text x="657" y="340">Question: What is the main thing you are still trying to decide?</text><text x="657" y="390">Value: The goal is protecting the home and creating clarity.</text><text x="657" y="440">Close: Would it make sense to review the next step together?</text></g></svg>