<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><rect width="1200" height="700" fill="#f8fafc"/><text x="50" y="70" font-family="Arial" font-size="34" font-weight="800" fill="#111827">Suggested follow-up sequence</text><text x="50" y="105" font-family="Arial" font-size="18" fill="#4b5563">A multi-touch follow-up plan based on urgency, intensity, concern, and days since last contact.</text><g font-family="Arial"><rect x="50" y="150" width="520" height="180" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="150" width="7" height="180" fill="#059669"/><text x="82" y="200" font-size="25" font-weight="800" fill="#111827">Same Day</text><text x="82" y="245" font-size="18" fill="#4b5563">Quick check-in, confirm questions, and ask for the next step.</text><rect x="630" y="150" width="520" height="180" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="630" y="150" width="7" height="180" fill="#059669"/><text x="662" y="200" font-size="25" font-weight="800" fill="#111827">Next Day</text><text x="662" y="245" font-size="18" fill="#4b5563">Reference the main concern and offer to walk through it.</text><rect x="50" y="380" width="520" height="180" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="50" y="380" width="7" height="180" fill="#059669"/><text x="82" y="430" font-size="25" font-weight="800" fill="#111827">Day 3</text><text x="82" y="475" font-size="18" fill="#4b5563">Ask what is holding the customer back and clarify the decision point.</text><rect x="630" y="380" width="520" height="180" rx="20" fill="#ffffff" stroke="#e5e7eb"/><rect x="630" y="380" width="7" height="180" fill="#059669"/><text x="662" y="430" font-size="25" font-weight="800" fill="#111827">Day 7</text><text x="662" y="475" font-size="18" fill="#4b5563">Close the loop or keep the opportunity active with a clear yes/no next step.</text></g></svg>